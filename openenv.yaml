spec_version: "1"
name: "maternal_health_triage_env"
type: "space"
runtime: "fastapi"
app: "server.app:app"
port: 8000
description: "Frontline public-health triage and escalation environment for maternal/newborn care."

tasks:
  - id: "easy_obvious_emergency"
    difficulty: "easy"
    description: "Triage a patient with an obvious emergency requirement (hemorrhage)."
  - id: "medium_ambiguous_symptoms"
    difficulty: "medium"
    description: "Triage a patient with ambiguous symptoms needing follow-up (preeclampsia risk)."
  - id: "hard_noisy_comorbid"
    difficulty: "hard"
    description: "Triage a patient with poor cell connection and vague symptoms about their newborn."

metadata:
  category: "healthcare"
  tags:
    - "openenv"
    - "healthcare"
    - "triage"
    - "reinforcement-learning"
